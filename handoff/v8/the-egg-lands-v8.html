    let html=await response.text();
    html=html.replace('<title>The Egg Lands</title>','<title>The Egg Lands v8</title>');
    html=html.replace('</head>',"\n<style id=\"governmentFeatureStyles\">\n.governmentColumns{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}.governmentSummary{display:grid;gap:6px;margin-bottom:12px}.governmentSummary span{color:var(--dim);font-size:12px}.governmentActions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.dangerBtn{border-color:var(--bad)!important;color:#ffd1ca!important}.governmentNotice{margin-top:10px;padding:10px;border:1px solid var(--line);background:#121722}.governmentNotice.danger{border-color:var(--bad)}.governmentRelation{display:grid;grid-template-columns:120px 1fr 38px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}.governmentRelation small{display:block;color:var(--dim);font-size:10px}.relationMeter{height:8px;background:#090c12;border:1px solid var(--line);overflow:hidden}.relationMeter span{display:block;height:100%;background:linear-gradient(90deg,var(--bad),var(--gold),var(--good))}.governmentRelation b{text-align:right}.versionBadge{font-size:9px;color:var(--gold);letter-spacing:1px;border:1px solid var(--line);padding:2px 5px;margin-left:7px}@media(max-width:760px){.governmentColumns{grid-template-columns:1fr}.governmentRelation{grid-template-columns:100px 1fr 34px}}\n.relationshipLayout{display:grid;grid-template-columns:minmax(180px,.55fr) minmax(320px,1.45fr);gap:12px}.relationshipRoster{display:flex;flex-direction:column;gap:5px;max-height:62vh;overflow:auto}.relationshipPerson{width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:8px;cursor:pointer}.relationshipPerson.active{border-color:var(--gold);color:var(--gold)}.relationshipTree{position:relative;min-height:360px;border:1px solid var(--line);background:radial-gradient(circle at center,rgba(226,173,69,.10),rgba(15,18,24,.96) 58%);overflow:hidden}.relationshipCenter{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:150px;padding:12px;border:2px solid var(--gold);background:var(--panel2);text-align:center;z-index:3}.relationshipNode{position:absolute;width:132px;padding:8px;border:1px solid var(--line);background:var(--panel);font-size:9px;line-height:1.35;text-align:center;z-index:2}.relationshipNode.friend{border-color:var(--good)}.relationshipNode.enemy{border-color:var(--bad)}.relationshipLine{position:absolute;height:2px;transform-origin:0 50%;z-index:1}.relationshipLine.friend{background:var(--good)}.relationshipLine.enemy{background:var(--bad)}.biasBar{height:8px;background:#0c1016;border:1px solid var(--line);margin-top:5px}.biasBar span{display:block;height:100%;background:linear-gradient(90deg,var(--bad),var(--gold),var(--good))}.speciesBadge{display:inline-block;border:1px solid var(--line);padding:2px 5px;margin-top:5px;color:var(--gold);font-size:9px}@media(max-width:760px){.relationshipLayout{grid-template-columns:1fr}.relationshipRoster{max-height:160px}.relationshipTree{min-height:440px}}\n.playerRelationshipList{display:grid;grid-template-columns:repeat(2,minmax(150px,1fr));gap:7px;margin-top:10px}.playerRelationshipCard{border:1px solid var(--line);background:var(--panel);padding:8px;font-size:9px;line-height:1.45}.playerRelationshipCard.family{border-color:var(--gold)}.playerRelationshipCard.friend{border-color:var(--good)}.playerRelationshipCard.enemy{border-color:var(--bad)}.playerRelationshipCard.heard{opacity:.72}.relationshipStatus{display:inline-block;margin-top:4px;padding:2px 5px;border:1px solid currentColor}.zoomReadout{color:var(--gold);font-weight:bold}.zoomSlider{width:100%}.fogLegend{font-size:9px;color:var(--dim);margin-top:6px;text-align:center}@media(max-width:760px){.playerRelationshipList{grid-template-columns:1fr}}\n</style>\n"+'</head>');
    html=html.replace('<h1>The Egg Lands</h1>','<h1>The Egg Lands <span class="versionBadge">v4</span></h1>');
    const oldTabs='<button class="uibtn menuTabBtn" data-menu-tab="chronicle">Journal</button><button class="uibtn menuTabBtn" data-menu-tab="home">Town</button>';
    const newTabs=oldTabs+'<button class="uibtn menuTabBtn" data-menu-tab="government">Government</button><button class="uibtn menuTabBtn" data-menu-tab="relationships">Relationships</button>';
    html=html.replace(oldTabs,newTabs);
    const homeSection='        <section class="menuTab" id="homeTab"><h2 id="homeTownTitle">Home town</h2><div class="sub menuLead" id="homeTownLead"></div><div id="homeTownContent"></div></section>';
    const governmentSection='        <section class="menuTab" id="governmentTab"><h2>Government</h2><div class="sub menuLead">Choose how your city is ruled, direct its economic focus, call raids, and track relations with neighboring settlements.</div><div id="governmentContent"></div></section>';
    const relationshipsSection='        <section class="menuTab" id="relationshipsTab"><h2>Relationships</h2><div class="sub menuLead">View your player character’s family, friends, enemies, acquaintances, and people merely heard of.</div><div id="relationshipsContent"></div></section>';
    html=html.replace(homeSection,homeSection+'\n'+governmentSection+'\n'+relationshipsSection);
    const patch="/* ============================================================\n   GOVERNMENT, DEMOCRATIC VOTING, RELATIONS, AND NPC RAIDS\n   ============================================================ */\nconst GOVERNMENT_TYPES={\n  council:{label:\"Council\",description:\"A small civic council chooses policy. Stable, but only council members vote.\",happiness:0},\n  empire:{label:\"Empire\",description:\"The player rules directly. Decisions pass immediately, but residents are less happy.\",happiness:-8},\n  democracy:{label:\"Democracy\",description:\"Every adult votes on major actions. Decisions are slower, but residents are generally happier.\",happiness:7}\n};\nconst GOVERNMENT_FOCI={\n  balanced:{label:\"Balanced growth\",good:null,skill:null,description:\"No single trade dominates public policy.\"},\n  food:{label:\"Food and fishing\",good:\"food\",skill:\"fishing\",description:\"Boost food production and encourage fishing skill.\"},\n  shelter:{label:\"Construction and forestry\",good:\"shelter\",skill:\"forestry\",description:\"Boost shelter production and encourage forestry skill.\"},\n  status:{label:\"Commerce and diplomacy\",good:\"status\",skill:\"hunting\",description:\"Boost status production and civic ambition.\"},\n  training:{label:\"Research and mining\",good:\"training\",skill:\"mining\",description:\"Boost training production and encourage mining skill.\"}\n};\nlet governmentRaidId=1;\n\nfunction governmentFor(town){\n  if(!town.government){\n    town.government={type:\"council\",focus:\"balanced\",relations:{},pendingVote:null,raid:null,lastDecision:null,raidHistory:[]};\n  }\n  town.government.relations=town.government.relations||{};\n  town.government.raidHistory=town.government.raidHistory||[];\n  for(const other of towns){\n    if(other===town)continue;\n    if(!town.government.relations[other.name])town.government.relations[other.name]={score:25,status:\"neutral\",lastConflictDay:null};\n  }\n  return town.government;\n}\nfunction homeGovernmentTown(){return towns.find(t=>t.name===(player.homeTownName||towns[0]?.name))||towns[0]}\nfunction adultCitizens(town){return town.agents.filter(a=>a.ageGroup!==\"child\"&&!a.eliminated)}\nfunction adultMen(town){return adultCitizens(town).filter(a=>a.gender===\"man\"||a.gender===\"male\")}\nfunction averageTownNeed(town,key){const people=adultCitizens(town);return people.reduce((sum,a)=>sum+(a.needs?.[key]||0),0)/Math.max(1,people.length)}\nfunction relationStatus(score){return score<=-50?\"war\":score<=-15?\"hostile\":score<20?\"neutral\":score<55?\"friendly\":\"allied\"}\nfunction adjustGovernmentRelation(from,to,delta){\n  const relation=governmentFor(from).relations[to.name]||(governmentFor(from).relations[to.name]={score:25,status:\"neutral\",lastConflictDay:null});\n  relation.score=clamp(relation.score+delta,-100,100);relation.status=relationStatus(relation.score);\n  const reverse=governmentFor(to).relations[from.name]||(governmentFor(to).relations[from.name]={score:25,status:\"neutral\",lastConflictDay:null});\n  reverse.score=clamp(reverse.score+delta*.8,-100,100);reverse.status=relationStatus(reverse.score);\n}\nfunction governmentHappiness(town){\n  const govt=governmentFor(town),base=GOVERNMENT_TYPES[govt.type]?.happiness||0;\n  return base-averageTownNeed(town,\"hunger\")*.08-averageTownNeed(town,\"safety\")*.05+averageTownNeed(town,\"belonging\")*-.04;\n}\n\nconst governmentBaseTownAdvantage=townAdvantage;\ntownAdvantage=function(town,good){\n  const base=governmentBaseTownAdvantage(town,good),focus=GOVERNMENT_FOCI[governmentFor(town).focus];\n  return base*(focus&&focus.good===good?1.22:1);\n};\n\nfunction citizenVoteScore(agent,town,decision){\n  const traits=agent.traits||[],needs=agent.needs||{},focus=GOVERNMENT_FOCI[decision.focus];\n  let score=(agent.utility>=town.market.avgUtility?4:-4)+(traits.includes(\"dutiful\")?5:0)+(traits.includes(\"stubborn\")?-4:0);\n  if(decision.kind===\"focus\"){\n    if(focus.good===agent.produces)score+=22;\n    if(focus.skill&&agent.lifeSkills?.[focus.skill]>0)score+=12;\n    if(decision.focus===\"balanced\")score+=traits.includes(\"cautious\")?10:2;\n  }\n  if(decision.kind===\"raid\"){\n    score+=(traits.includes(\"protective\")?16:0)+(traits.includes(\"ambitious\")?10:0)-(traits.includes(\"cautious\")?18:0);\n    score+=(needs.safety>55?-18:4)+(roadSafety<45?8:0);\n    if(decision.targetType===\"town\")score-=10;\n  }\n  return score+(rand()-.5)*18;\n}\nfunction resolveGovernmentDecision(town,decision){\n  const govt=governmentFor(town),type=govt.type;\n  let voters=[],yes=0,no=0,passed=false;\n  if(type===\"empire\"){passed=true;yes=1}\n  else{\n    voters=type===\"democracy\"?adultCitizens(town):adultCitizens(town).filter(a=>town.institutions?.councilIds?.includes(a.id));\n    if(!voters.length)voters=adultCitizens(town);\n    for(const voter of voters){if(citizenVoteScore(voter,town,decision)>=0)yes++;else no++}\n    passed=yes>no;\n  }\n  govt.lastDecision={day:dayNo,decision,passed,yes,no,type};\n  recordVillageEvent(town,\"GOVERNMENT\",GOVERNMENT_TYPES[type].label+\" decision: \"+decision.label+\" \u2014 \"+(passed?\"approved\":\"rejected\")+(type===\"empire\"?\" by decree\":\" \"+yes+\"\u2013\"+no+\".\"),{salience:8});\n  if(type===\"democracy\")for(const a of adultCitizens(town))a.needs.belonging=clamp(a.needs.belonging-(passed?3:1),0,100);\n  if(type===\"empire\")for(const a of adultCitizens(town)){a.needs.belonging=clamp(a.needs.belonging+4,0,100);a.needs.status=clamp(a.needs.status+2,0,100)}\n  return passed;\n}\nfunction setGovernmentType(town,type){\n  if(!GOVERNMENT_TYPES[type])return;\n  const old=governmentFor(town).type;governmentFor(town).type=type;\n  recordVillageEvent(town,\"REGIME\",town.name+\" changes from \"+GOVERNMENT_TYPES[old].label+\" to \"+GOVERNMENT_TYPES[type].label+\".\",{salience:10});\n  for(const a of adultCitizens(town)){a.needs.belonging=clamp(a.needs.belonging+(type===\"empire\"?8:type===\"democracy\"?-6:0),0,100)}\n  toast(town.name+\" is now a \"+GOVERNMENT_TYPES[type].label+\".\");renderGovernment();saveGame(true);\n}\nfunction requestTownFocus(town,focusKey){\n  const focus=GOVERNMENT_FOCI[focusKey];if(!focus)return;\n  const decision={kind:\"focus\",focus:focusKey,label:\"Adopt \"+focus.label+\" as the town focus\"};\n  if(!resolveGovernmentDecision(town,decision)){toast(\"The government rejected the new focus.\");renderGovernment();return}\n  governmentFor(town).focus=focusKey;\n  for(const a of adultCitizens(town)){\n    if(focus.skill){a.lifeSkills[focus.skill]=a.lifeSkills[focus.skill]||0;if(rand()<.22)a.currentActivity=\"considering work in \"+focus.label.toLowerCase()}\n    a.needs.purpose=clamp(a.needs.purpose-(focus.good===a.produces?5:1),0,100);\n  }\n  toast(town.name+\" now focuses on \"+focus.label+\".\");renderGovernment();saveGame(true);\n}\nfunction closestOtherTown(town){return towns.filter(t=>t!==town).sort((a,b)=>Math.hypot(a.cx-town.cx,a.cy-town.cy)-Math.hypot(b.cx-town.cx,b.cy-town.cy))[0]}\nfunction raidRallyPoint(town){return {x:town.marketPoint.x+24,y:town.marketPoint.y+18}}\nfunction beginRaid(town,targetType){\n  const men=adultMen(town);if(!men.length){toast(\"There are no adult men available to form the raid.\");return}\n  if(governmentFor(town).raid){toast(\"A raid is already underway.\");return}\n  const targetTown=targetType===\"town\"?closestOtherTown(town):null;\n  const label=targetType===\"town\"?\"Raid \"+targetTown.name:\"Raid the old mine dungeon\";\n  if(!resolveGovernmentDecision(town,{kind:\"raid\",targetType,label})){toast(\"The raid proposal was rejected.\");renderGovernment();return}\n  const rally=raidRallyPoint(town),raid={id:governmentRaidId++,phase:\"gathering\",targetType,targetTownName:targetTown?.name||null,countdown:30,rally,memberIds:men.map(a=>a.id),casualties:0,startedDay:dayNo};\n  governmentFor(town).raid=raid;\n  for(const a of men){a.raidState={raidId:raid.id,phase:\"gathering\",hp:Math.max(3,a.level+2),attackCd:0};a.currentActivity=\"rallying for a raid\"}\n  recordVillageEvent(town,\"RAID\",men.length+\" men begin gathering for \"+label.toLowerCase()+\".\",{salience:10});\n  toast(\"Raid called. The men will rally for 30 seconds.\");renderGovernment();\n}\nfunction moveAgentToward(a,target,speed,dt){\n  const dx=target.x-a.x,dy=target.y-a.y,d=Math.hypot(dx,dy);if(d<2)return true;\n  const nx=a.x+dx/d*speed*dt,ny=a.y+dy/d*speed*dt,cell=keyOf(Math.floor(nx/TILE),Math.floor(ny/TILE));\n  if(!solid.has(cell)){a.x=nx;a.y=ny;a.face={x:dx/d,y:dy/d}}\n  return d<8;\n}\nfunction eliminateCitizen(agent,killerTown=null){\n  if(!agent||agent.eliminated)return;agent.eliminated=true;\n  const town=agent.town;try{releaseHouse(agent)}catch(error){}\n  town.agents=town.agents.filter(a=>a!==agent);agents=agents.filter(a=>a!==agent);\n  recordVillageEvent(town,\"DEATH\",agent.firstName+\" is killed in a clash\"+(killerTown?\" with \"+killerTown.name:\"\")+\".\",{actorId:agent.id,emotion:\"grief\",salience:10});\n  for(const relative of town.agents.filter(a=>a.spouseId===agent.id||(a.parentIds||[]).includes(agent.id)||(a.childrenIds||[]).includes(agent.id))){relative.needs.belonging=clamp(relative.needs.belonging+24,0,100);relative.needs.safety=clamp(relative.needs.safety+18,0,100)}\n}\nfunction raidCombat(attacker,target,dt){\n  attacker.raidState.attackCd=Math.max(0,attacker.raidState.attackCd-dt);target.worldHp=Number.isFinite(target.worldHp)?target.worldHp:Math.max(3,target.level+2);\n  if(Math.hypot(attacker.x-target.x,attacker.y-target.y)>18){moveAgentToward(attacker,target,34,dt);return}\n  if(attacker.raidState.attackCd<=0){target.worldHp-=1+Math.floor(attacker.level/4);attacker.raidState.attackCd=.75+rand()*.45;changeRelationship(attacker,target,{resentment:14,trust:-10});if(target.worldHp<=0)eliminateCitizen(target,attacker.town)}\n}\nfunction finishRaid(town,success){\n  const govt=governmentFor(town),raid=govt.raid;if(!raid)return;\n  const survivors=raid.memberIds.map(id=>agents.find(a=>a.id===id)).filter(Boolean);\n  for(const a of survivors){a.raidState=null;a.currentActivity=\"returning from the raid\";a.needs.safety=clamp(a.needs.safety+(success?-5:12),0,100)}\n  const target=raid.targetTownName&&towns.find(t=>t.name===raid.targetTownName);\n  if(target){adjustGovernmentRelation(town,target,-55);governmentFor(town).relations[target.name].lastConflictDay=dayNo;governmentFor(target).relations[town.name].lastConflictDay=dayNo}\n  govt.raidHistory.unshift({day:dayNo,target:target?.name||\"Old Mine\",success,casualties:raid.casualties});govt.raidHistory=govt.raidHistory.slice(0,8);\n  recordVillageEvent(town,\"RAID\",town.name+\"'s raid on \"+(target?.name||\"the old mine\")+\" \"+(success?\"returns with plunder\":\"breaks apart\")+\".\",{salience:10});\n  govt.raid=null;toast(success?\"The raid returns successfully.\":\"The raid has failed.\");renderGovernment();saveGame(true);\n}\nfunction stepGovernmentRaids(dt){\n  if(scene!==\"world\")return;\n  for(const town of towns){\n    const raid=governmentFor(town).raid;if(!raid)continue;\n    const members=raid.memberIds.map(id=>agents.find(a=>a.id===id)).filter(Boolean);\n    raid.casualties=raid.memberIds.length-members.length;\n    if(!members.length){finishRaid(town,false);continue}\n    if(raid.phase===\"gathering\"){\n      raid.countdown=Math.max(0,raid.countdown-dt);\n      for(const a of members)moveAgentToward(a,raid.rally,30,dt);\n      if(raid.countdown<=0){raid.phase=\"marching\";for(const a of members){a.raidState.phase=\"marching\";a.currentActivity=\"marching on a raid\"}recordVillageEvent(town,\"RAID\",\"The raiding party marches from \"+town.name+\".\",{salience:9})}\n      continue;\n    }\n    if(raid.targetType===\"dungeon\"){\n      const target=dungeon.entrance||{x:(MW-8)*TILE,y:(MH-8)*TILE};let arrived=0;\n      for(const a of members)if(moveAgentToward(a,target,36,dt))arrived++;\n      if(arrived>=Math.ceil(members.length*.7)){town.market.treasury+=10+members.length*2;town.materialStock[3]+=3+members.length*.5;finishRaid(town,true)}\n      continue;\n    }\n    const targetTown=towns.find(t=>t.name===raid.targetTownName);if(!targetTown){finishRaid(town,false);continue}\n    const defenders=targetTown.agents.filter(a=>!a.eliminated&&a.ageGroup!==\"child\");\n    for(const a of members){\n      const target=defenders.filter(d=>!d.eliminated).sort((x,y)=>Math.hypot(x.x-a.x,x.y-a.y)-Math.hypot(y.x-a.x,y.y-a.y))[0];\n      if(target)raidCombat(a,target,dt);else moveAgentToward(a,targetTown.marketPoint,36,dt);\n    }\n    for(const defender of defenders.filter(d=>!d.eliminated)){\n      defender.worldAttackCd=Math.max(0,(defender.worldAttackCd||0)-dt);\n      const target=members.filter(a=>!a.eliminated).sort((x,y)=>Math.hypot(x.x-defender.x,x.y-defender.y)-Math.hypot(y.x-defender.x,y.y-defender.y))[0];\n      if(!target)continue;if(Math.hypot(defender.x-target.x,defender.y-target.y)>18){moveAgentToward(defender,target,32,dt);continue}\n      if(defender.worldAttackCd<=0){target.raidState.hp-=1+(defender.isGuard?1:0);defender.worldAttackCd=.9+rand()*.5;if(target.raidState.hp<=0){raid.casualties++;eliminateCitizen(target,targetTown)}}\n    }\n    if(!targetTown.agents.some(a=>a.ageGroup!==\"child\"&&!a.eliminated)){town.market.treasury+=Math.min(35,targetTown.market.treasury*.35);targetTown.market.treasury*=.65;finishRaid(town,true)}\n    else if(raid.casualties>=Math.ceil(raid.memberIds.length*.55))finishRaid(town,false);\n  }\n}\nfunction separateCitizens(){\n  for(let i=0;i<agents.length;i++)for(let j=i+1;j<agents.length;j++){\n    const a=agents[i],b=agents[j];if(a.eliminated||b.eliminated||a.raidState||b.raidState)continue;\n    const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy);if(d>0&&d<9){const push=(9-d)*.18;a.x-=dx/d*push;a.y-=dy/d*push;b.x+=dx/d*push;b.y+=dy/d*push}\n  }\n}\nconst governmentBaseStepAgents=stepAgents;\nstepAgents=function(dt){governmentBaseStepAgents(dt);stepGovernmentRaids(dt);separateCitizens()};\nconst governmentBaseNewDay=newDay;\nnewDay=function(){governmentBaseNewDay();for(const town of towns){const govt=governmentFor(town);for(const a of adultCitizens(town)){if(govt.type===\"empire\")a.needs.belonging=clamp(a.needs.belonging+1.2,0,100);if(govt.type===\"democracy\")a.needs.belonging=clamp(a.needs.belonging-.8,0,100)}const focus=GOVERNMENT_FOCI[govt.focus];if(focus?.skill)for(const a of adultCitizens(town))if(a.lifeSkills?.[focus.skill]!=null&&rand()<.08)a.lifeSkills[focus.skill]=Math.min(3,a.lifeSkills[focus.skill]+1)} };\n\nfunction renderGovernment(){\n  const wrap=document.getElementById(\"governmentContent\");if(!wrap||!towns.length)return;\n  const town=homeGovernmentTown(),govt=governmentFor(town),type=GOVERNMENT_TYPES[govt.type],raid=govt.raid;\n  const relationRows=towns.filter(t=>t!==town).map(other=>{const relation=govt.relations[other.name];return '<div class=\"governmentRelation\"><div><strong>'+escapeHTML(other.name)+'</strong><small>'+escapeHTML(relation.status.toUpperCase())+'</small></div><div class=\"relationMeter\"><span style=\"width:'+((relation.score+100)/2)+'%\"></span></div><b>'+Math.round(relation.score)+'</b></div>'}).join(\"\");\n  const last=govt.lastDecision?'<div class=\"governmentNotice\">Last decision: '+escapeHTML(govt.lastDecision.decision.label)+' \u2014 '+(govt.lastDecision.passed?'passed':'failed')+(govt.lastDecision.type==='empire'?' by decree':' '+govt.lastDecision.yes+'\u2013'+govt.lastDecision.no)+'.</div>':'';\n  const raidStatus=raid?'<div class=\"governmentNotice danger\"><strong>Raid '+escapeHTML(raid.phase)+'</strong><br>'+(raid.phase==='gathering'?Math.ceil(raid.countdown)+' seconds until march':escapeHTML(raid.targetTownName||'Old Mine'))+' \u00b7 '+raid.memberIds.length+' called \u00b7 '+raid.casualties+' lost</div>':'<div class=\"sub\">No active raid.</div>';\n  wrap.innerHTML='<div class=\"governmentColumns\"><div><div class=\"menuCard\"><h3>Government actions</h3><div class=\"governmentSummary\"><strong>'+escapeHTML(town.nam
