</style>
<script id="physical-resources-v21-script">
(function(){
  "use strict";
  const PHYSICAL_RESOURCE_VERSION=1;
  const DITCH_TILE_V21=16;
  let physicalFishBodiesV21=[];
  let fishBodyByTileV21=new Map();
  let ditchCellsV21=new Map();
  let resourceEffectsV21=[];
  let physicalFrameTimeV21=performance.now();

  function ensurePhysicalPlayerV21(){
    player.equipment=Object.assign({fishing:false,forestry:false,mining:false,hunting:false,digging:false},player.equipment||{});
    player.lifeSkills=Object.assign({fishing:0,forestry:0,mining:0,hunting:0,digging:0},player.lifeSkills||{});
  }
  function installShovelDataV21(){
    if(!EQUIPMENT.digging)EQUIPMENT.digging={name:"Field Shovel",icon:"Y",price:6};
    if(!LIFE_SKILLS.digging)LIFE_SKILLS.digging={name:"Earthworks",icon:"▱",material:2,nodes:[
      ["Strong Back","Dig and refill ditches with less recovery time."],
      ["Water Reader","Wet ditches are easier to identify and extend."],
      ["Canal Keeper","Connected ditches retain water through dry ground."]
    ]};
    if(!PACK_DEFS.tool_digging)PACK_DEFS.tool_digging={name:"Field Shovel",icon:"Y",w:1,h:3,stack:1};
  }
  function waterKeyV21(x,y){return x+","+y}
  function bodyLabelV21(body){return body.isPond?"Fishing Pond":body.cells.length>70?"Great Water":body.cells.length>24?"Lake":"Pool"}
  function buildFishBodiesV21(savedBodies){
    physicalFishBodiesV21=[];fishBodyByTileV21=new Map();
    const visited=new Set(),savedMap=new Map((savedBodies||[]).map(b=>[b.id,b]));
    const pondX=resourceNodes&&resourceNodes.fishing?Math.floor(resourceNodes.fishing.x/TILE):25;
    const pondY=resourceNodes&&resourceNodes.fishing?Math.floor(resourceNodes.fishing.y/TILE):5;
    for(let sy=0;sy<MH;sy++)for(let sx=0;sx<MW;sx++){
      const start=waterKeyV21(sx,sy);if(visited.has(start)||tiles[sy]?.[sx]!==2)continue;
      const queue=[[sx,sy]],cells=[];visited.add(start);
      while(queue.length){
        const [x,y]=queue.shift();cells.push({x,y});
        for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
          const nx=x+dx,ny=y+dy,key=waterKeyV21(nx,ny);
          if(nx<0||ny<0||nx>=MW||ny>=MH||visited.has(key)||tiles[ny]?.[nx]!==2)continue;
          visited.add(key);queue.push([nx,ny]);
        }
      }
      const ordered=cells.slice().sort((a,b)=>a.y-b.y||a.x-b.x),id=waterKeyV21(ordered[0].x,ordered[0].y);
      const isPond=cells.some(c=>c.x===pondX&&c.y===pondY);
      const calculatedMax=isPond?60:Math.max(12,Math.min(180,Math.round(cells.length*1.8)));
      const saved=savedMap.get(id),savedMax=Number(saved&&saved.max),savedStock=Number(saved&&saved.stock),max=Math.max(1,Number.isFinite(savedMax)?savedMax:calculatedMax);
      const initialStock=Number.isFinite(savedStock)?savedStock:(isPond&&resourceNodes.fishing?resourceNodes.fishing.stock:max);
      const body={id,cells,max,stock:Math.max(0,Math.min(max,initialStock)),isPond};
      body.cx=cells.reduce((n,c)=>n+c.x,0)/cells.length;body.cy=cells.reduce((n,c)=>n+c.y,0)/cells.length;
      body.markers=ordered.filter((c,i)=>i%Math.max(1,Math.floor(ordered.length/9))===0).slice(0,9);
      physicalFishBodiesV21.push(body);for(const c of cells)fishBodyByTileV21.set(waterKeyV21(c.x,c.y),body);
    }
    syncFishingNodeV21();
  }
  function syncFishingNodeV21(){
    const pond=physicalFishBodiesV21.find(b=>b.isPond);if(pond&&resourceNodes&&resourceNodes.fishing){resourceNodes.fishing.max=pond.max;resourceNodes.fishing.stock=pond.stock}
  }
  function fishBodyAtV21(x,y){return fishBodyByTileV21.get(waterKeyV21(x,y))||null}
  function nearbyFishBodyV21(radiusTiles=3){
    if(scene!=="world")return null;
    const px=Math.floor((player.x+8)/TILE),py=Math.floor((player.y+8)/TILE);let best=null,bestD=Infinity;
    for(let y=py-radiusTiles;y<=py+radiusTiles;y++)for(let x=px-radiusTiles;x<=px+radiusTiles;x++){
      const body=fishBodyAtV21(x,y);if(!body)continue;const d=Math.hypot(x-px,y-py);if(d<bestD){best=body;bestD=d}
    }
    return best;
  }
  function fishStatusV21(body){
    const ratio=body.max?body.stock/body.max:0;
    return ratio<=0?{label:"Depleted",cls:"depleted"}:ratio<.28?{label:"Strained",cls:"strained"}:ratio<.68?{label:"Stable",cls:"strained"}:{label:"Abundant",cls:"healthy"};
  }
  function regenerateFishV21(){
    for(const body of physicalFishBodiesV21){
      const ratio=body.stock/body.max,base=Math.max(1,Math.round(body.max*.055)),recovery=ratio<.25?Math.max(1,Math.round(base*.6)):base;
      body.stock=Math.min(body.max,body.stock+recovery);
    }
    syncFishingNodeV21();
  }
  function refreshDitchWaterV21(){
    for(const state of ditchCellsV21.values())state.wet=false;
    const queue=[];
    for(const [key,state] of ditchCellsV21){
      const [x,y]=key.split(",").map(Number);
      const touchesWater=[[1,0],[-1,0],[0,1],[0,-1]].some(([dx,dy])=>tiles[y+dy]?.[x+dx]===2);
      if(touchesWater){state.wet=true;queue.push([x,y])}
    }
    while(queue.length){
      const [x,y]=queue.shift();
      for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
        const key=waterKeyV21(x+dx,y+dy),state=ditchCellsV21.get(key);if(!state||state.wet)continue;
        state.wet=true;queue.push([x+dx,y+dy]);
      }
    }
  }
  function drawDitchesOnWorldV21(){
    if(!worldCanvas)return;refreshDitchWaterV21();const w=worldCanvas.getContext("2d");
    for(const [key,state] of ditchCellsV21){
      const [x,y]=key.split(",").map(Number),px=x*TILE,py=y*TILE;
      w.fillStyle=state.wet?"#294b5b":"#5b452c";w.fillRect(px,py,TILE,TILE);
      w.fillStyle=state.wet?"#3e7080":"#2e241a";w.fillRect(px+2,py+6,TILE-4,5);
      w.fillStyle=state.wet?"#79a8b3":"#8b6a41";w.fillRect(px+3,py+7,TILE-6,1);
      w.fillStyle="#2a3f32";w.fillRect(px,py,2,TILE);w.fillRect(px+TILE-2,py,2,TILE);
    }
  }
  function facingTileV21(){
    const reach=21,x=Math.floor((player.x+8+player.face.x*reach)/TILE),y=Math.floor((player.y+8+player.face.y*reach)/TILE);return {x,y,key:waterKeyV21(x,y)};
  }
  function canDigTileV21(x,y){
    if(x<1||y<1||x>=MW-1||y>=MH-1)return false;
    if(insideTownBounds(x*TILE,y*TILE,0))return false;
    return [0,11,12,13,14,15].includes(tiles[y]?.[x]);
  }
  function digDitchV21(){
    if(scene!=="world"||!selectedClass)return false;
    ensurePhysicalPlayerV21();if(!entityHasEquipment(player,"digging"))return false;
    const target=facingTileV21(),existing=ditchCellsV21.get(target.key);
    if(existing){
      tiles[target.y][target.x]=existing.originalTile;ditchCellsV21.delete(target.key);solid.delete(target.key);refreshDitchWaterV21();paintWorld();
      player.harvestAnim=.28;player.harvestKind="mining";playSfx("mine");toast("You refill the ditch and level the ground.");saveGame(true);return true;
    }
    if(!canDigTileV21(target.x,target.y)){toast("Face open meadow, forest floor, wetland, or scrub to dig a ditch.");return true}
    ditchCellsV21.set(target.key,{originalTile:tiles[target.y][target.x],wet:false,dugDay:dayNo});tiles[target.y][target.x]=DITCH_TILE_V21;solid.delete(target.key);
    refreshDitchWaterV21();paintWorld();player.harvestAnim=.32;player.harvestKind="mining";playSfx("mine");
    const cx=target.x*TILE+8,cy=target.y*TILE+8;for(let i=0;i<7;i++)particles.push({scene:"world",x:cx,y:cy,vx:(rand()-.5)*36,vy:(rand()-.5)*36,life:.32,color:"#8b6a41"});
    const state=ditchCellsV21.get(target.key);gainPlayerXP(1,"earthworks");toast(state.wet?"Ditch dug. Water flows into the new channel.":"Ditch dug. Connect it to water to create an irrigation channel.");updateUI();saveGame(true);return true;
  }
  function spawnResourceEffectV21(type,target){
    const cx=target.x*TILE+8,cy=target.y*TILE+8,dx=cx-(player.x+8),dy=cy-(player.y+8),d=Math.max(1,Math.hypot(dx,dy));
    if(type==="tree")resourceEffectsV21.push({type,x:cx,y:cy,t:0,duration:.95,dx:dx/d,dy:dy/d});
    else{
      const fragments=Array.from({length:9},(_,i)=>{const angle=(Math.PI*2*i/9)+(rand()-.5)*.45,speed=12+rand()*26;return {angle,speed,size:2+Math.floor(rand()*3)}});
      resourceEffectsV21.push({type:"rock",x:cx,y:cy,t:0,duration:.72,fragments});
    }
  }
  function stepResourceEffectsV21(dt){
    for(const effect of resourceEffectsV21)effect.t+=dt;
    resourceEffectsV21=resourceEffectsV21.filter(effect=>effect.t<effect.duration);
  }
  function drawResourceEffectsV21(){
    if(scene!=="world")return;const vw=viewW(),vh=viewH(),now=performance.now()/1000;
    ctx.save();ctx.scale(worldZoom,worldZoom);
    for(const body of physicalFishBodiesV21){
      const ratio=body.max?body.stock/body.max:0,count=Math.ceil(body.markers.length*ratio);
      for(let i=0;i<count;i++){
        const cell=body.markers[i],x=cell.x*TILE+8-camera.x,y=cell.y*TILE+8-camera.y;if(x<-10||y<-10||x>vw+10||y>vh+10)continue;
        const bob=Math.sin(now*2.4+i*1.7)*1.5;ctx.strokeStyle="rgba(160,218,232,.68)";ctx.beginPath();ctx.arc(x,y+bob,3+(i%2),0,Math.PI*1.4);ctx.stroke();
        ctx.fillStyle="rgba(198,235,226,.72)";ctx.fillRect(x-1,y-1+bob,3,1);
      }
    }
    for(const effect of resourceEffectsV21){
      const p=Math.min(1,effect.t/effect.duration),alpha=1-Math.max(0,(p-.72)/.28),sx=effect.x-camera.x,sy=effect.y-camera.y;
      ctx.globalAlpha=alpha;
      if(effect.type==="tree"){
        const eased=1-Math.pow(1-p,3),length=8+eased*24,tx=sx+effect.dx*length,ty=sy+effect.dy*length;
        ctx.strokeStyle="rgba(25,20,14,.35)";ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(sx+2,sy+3);ctx.lineTo(tx+3,ty+5);ctx.stroke();
        ctx.strokeStyle="#5b3b24";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(tx,ty);ctx.stroke();
        ctx.fillStyle="#315b38";ctx.beginPath();ctx.arc(tx,ty,7-p*2,0,Math.PI*2);ctx.fill();ctx.fillStyle="#46764c";ctx.fillRect(tx-3,ty-4,6,3);
        ctx.fillStyle="#8b6a41";ctx.fillRect(sx-2,sy-2,4,4);ctx.lineWidth=1;
      }else{
        for(const frag of effect.fragments){
          const travel=frag.speed*p,fx=sx+Math.cos(frag.angle)*travel,fy=sy+Math.sin(frag.angle)*travel+p*p*9;
          ctx.fillStyle=p<.55?"#858b91":"#555c63";ctx.fillRect(Math.round(fx),Math.round(fy),frag.size,frag.size);
        }
      }
    }
    ctx.globalAlpha=1;ctx.restore();
  }
  function installResourceHudV21(){
    const stage=document.getElementById("stage");if(!stage||document.getElementById("resourceHudV21"))return;
    const hud=document.createElement("div");hud.id="resourceHudV21";stage.appendChild(hud);
  }
  function updateResourceHudV21(){
    const hud=document.getElementById("resourceHudV21");if(!hud)return;
    const body=nearbyFishBodyV21(3),target=facingTileV21(),ditch=ditchCellsV21.get(target.key);
    if(scene!=="world"||(!body&&!ditch)){hud.style.display="none";return}
    hud.style.display="block";let html="";
    if(body){const status=fishStatusV21(body),pct=Math.round(body.stock/body.max*100);html+='<strong>FISH POPULATION</strong><span class="'+status.cls+'">'+bodyLabelV21(body)+' - '+Math.floor(body.stock)+' / '+body.max+' - '+status.label+'</span><div class="meter"><div class="resourceMeterFill" style="width:'+pct+'%;background:'+(status.cls==="depleted"?'var(--bad)':status.cls==="healthy"?'var(--good)':'var(--gold)')+'"></div></div>'}
    if(ditch)html+='<strong style="margin-top:6px">EARTHWORKS</strong><span class="'+(ditch.wet?'healthy':'strained')+'">Facing a '+(ditch.wet?'water-filled irrigation ditch':'dry ditch')+'. Use again to refill it.</span>';
    hud.innerHTML=html;
  }
  function restorePhysicalStateV21(saved){
    buildFishBodiesV21(saved&&saved.fishBodies);
    ditchCellsV21=new Map();
    for(const entry of saved&&saved.ditches||[]){
      const key=entry.key,[x,y]=key.split(",").map(Number);if(x<0||y<0||x>=MW||y>=MH)continue;
      ditchCellsV21.set(key,{originalTile:Number.isFinite(entry.originalTile)?entry.originalTile:0,wet:false,dugDay:entry.dugDay||dayNo});tiles[y][x]=DITCH_TILE_V21;solid.delete(key);
    }
    refreshDitchWaterV21();paintWorld();
  }
  function installHelpAndTouchV21(){
    const help=document.querySelector("#helpTab .helpGrid");
    if(help&&!document.getElementById("earthworksHelpV21")){
      const key=document.createElement("span");key.className="key";key.id="earthworksHelpV21";key.textContent="Shovel + E / Use";
      const text=document.createElement("span");text.textContent="Buy a Field Shovel at a market. Face open ground and use it to dig a ditch; connect ditch tiles to water for visible irrigation flow. Use the shovel on a ditch again to refill it.";
      help.insertBefore(key,help.children[4]||null);help.insertBefore(text,key.nextSibling);
    }
    const touchSpec=document.getElementById("touchSpec");
    if(touchSpec&&!document.getElementById("touchDigV21")){
      const button=document.createElement("button");button.className="pad round";button.id="touchDigV21";button.textContent="Dig";button.addEventListener("click",()=>{if(!digDitchV21())toast("Buy a Field Shovel at a town market first.")});touchSpec.parentNode.insertBefore(button,touchSpec);
    }
  }

  installShovelDataV21();ensurePhysicalPlayerV21();buildFishBodiesV21();installResourceHudV21();installHelpAndTouchV21();

  const originalSetupGameV21=setupGame;
  setupGame=function(newSeed,loading=false){
    const result=originalSetupGameV21(newSeed,loading);ensurePhysicalPlayerV21();ditchCellsV21=new Map();resourceEffectsV21=[];buildFishBodiesV21();window.setTimeout(()=>{installResourceHudV21();installHelpAndTouchV21();paintWorld()},0);return result;
  };
  const originalPaintWorldV21=paintWorld;
  paintWorld=function(){const result=originalPaintWorldV21();drawDitchesOnWorldV21();return result};
  paintWorld();

  const originalGatherNearbyV21=gatherNearby;
  gatherNearby=function(){
    const target=findGatherTarget(),body=target&&target.def&&target.def.index===0?fishBodyAtV21(target.x,target.y):null;
    if(body&&body.stock<1){toast(bodyLabelV21(body)+" has been fished out. Its population will recover over future days.");return true}
    const fishBefore=player.materials[0]||0,tileBefore=target&&tiles[target.y]?.[target.x],result=originalGatherNearbyV21();
    if(target&&tileBefore===1&&tiles[target.y]?.[target.x]===9)spawnResourceEffectV21("tree",target);
    if(target&&tileBefore===4&&tiles[target.y]?.[target.x]===10)spawnResourceEffectV21("rock",target);
    if(body){
      const gained=Math.max(0,(player.materials[0]||0)-fishBefore);if(gained){const allowed=Math.min(gained,Math.floor(body.stock));if(allowed<gained)player.materials[0]-=(gained-allowed);body.stock=Math.max(0,body.stock-allowed);syncFishingNodeV21();updateUI()}
    }
    return result;
  };

  const originalInteractV21=interact;
  interact=function(){
    if(!selectedClass)return;
    if(activePanel){closePanels();return}
    if(scene==="shop"){if(Math.hypot(player.x-currentShop.exit.x,player.y-currentShop.exit.y)<30){leaveShop();return}if(Math.hypot(player.x-currentShop.bench.x,player.y-currentShop.bench.y)<38){openMenu("crafting");return}toast("The displays are beautiful, but the crafting bench is at the front of the shop.");return}
    if(scene!=="world"){if(Math.hypot(player.x-dungeon.entry.x,player.y-dungeon.entry.y)<25){leaveDungeon();return}if(Math.hypot(player.x-dungeon.chest.x,player.y-dungeon.chest.y)<28){openDungeonChest();return}toast("The mine answers only with dripping stone.");return}
    if(Math.hypot(player.x-dungeon.entrance.x,player.y-dungeon.entrance.y)<30){enterDungeon();return}
    for(const town of towns){const shop=town.shops.find(s=>Math.hypot(player.x-s.x,player.y-s.y)<18);if(shop){enterShop(town,shop);return}if(Math.hypot(player.x-town.marketPoint.x,player.y-town.marketPoint.y)<28){openMarket(town);return}if(Math.hypot(player.x-town.plot.x,player.y-town.plot.y)<30){openBuild(town);return}}
    const a=nearestAgent();if(a){openDialogue(a);return}const c=caravans.find(c=>Math.hypot(c.x-player.x,c.y-player.y)<28);if(c){toast(c.from.name+" caravan: "+c.qty+" "+GOODS[c.good]+" bound for "+c.to.name+".");return}
    if(entityHasEquipment(player,"digging")){const digTarget=facingTileV21();if(ditchCellsV21.has(digTarget.key)||canDigTileV21(digTarget.x,digTarget.y)){if(digDitchV21())return}}
    if(gatherNearby())return;toast(entityHasEquipment(player,"digging")?"Face open ground to dig, or approach something that can be used.":"Nothing here needs your attention.");
  };

  const originalNewDayV21=newDay;
  newDay=function(){const result=originalNewDayV21();regenerateFishV21();refreshDitchWaterV21();paintWorld();return result};
  const originalTerrainMoveFactorV21=terrainMoveFactor;
  terrainMoveFactor=function(tile){return tile===DITCH_TILE_V21?.62:originalTerrainMoveFactorV21(tile)};

  const originalSnapshotV21=snapshot;
  snapshot=function(){
    const data=originalSnapshotV21();data.version=Math.max(21,Number(data.version)||0);data.physicalResources={version:PHYSICAL_RESOURCE_VERSION,fishBodies:physicalFishBodiesV21.map(b=>({id:b.id,stock:b.stock,max:b.max})),ditches:[...ditchCellsV21.entries()].map(([key,state])=>({key,originalTile:state.originalTile,dugDay:state.dugDay}))};return data;
  };
  const originalApplySaveV21=applySave;
  applySave=function(data){const result=originalApplySaveV21(data);ensurePhysicalPlayerV21();restorePhysicalStateV21(data&&data.physicalResources);installResourceHudV21();installHelpAndTouchV21();return result};

  const originalRenderV21=render;

  const originalRenderMenuMapV21=renderMenuMap;

    for(const body of physicalFishBodiesV21){const key=waterKeyV21(Math.round(body.cx),Math.round(body.cy));if(!exploredWorldCells.has(key))continue;m.fillStyle="#d9f3f0";m.fillText("F "+Math.floor(body.stock)+"/"+body.max,body.cx*sx,body.cy*sy)}m.restore();
  };

  };

  const title=document.querySelector("header h1");if(title)title.title="Physical Resources v21";
  toast("Physical Resources v21 loaded: falling trees, breaking rocks, fish populations, and shovel ditches.");
})();
