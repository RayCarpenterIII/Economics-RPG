<style id="npc-conversation-intelligence-v32-style">

</style>
<script id="npc-conversation-intelligence-v32-script">
(()=>{
  const CONVERSATION_VERSION_V32=32;
  const INTENT_LABELS_V32={greeting:"greeting",identity:"personal identity",goal:"long-term goal",mood:"current mood",risk:"risk and danger",playerOpinion:"opinion of the traveler",government:"government",faction:"political faction",relationships:"friendships and grudges",romance:"romance and courtship",family:"family",memory:"important memories",recall:"previous conversation",work:"work and skills",market:"market conditions",shortage:"shortages",danger:"roads and danger",town:"the town",help:"needed help",why:"reasoning",farewell:"farewell",unknown:"open conversation"};
  function hashConversationV32(value){if(typeof hash01V30==="function")return hash01V30(String(value));let h=2166136261;for(const c of String(value)){h^=c.charCodeAt(0);h=Math.imul(h,16777619)}return ((h>>>0)%1000000)/1000000}
  function safeMindV32(a){return typeof ensureMindV30==="function"?ensureMindV30(a):(a.mindV30||(a.mindV30={goal:{label:"Build a meaningful life",reason:"I want my work and family to endure.",progress:0},riskTolerance:.5,mood:{label:"steady"},opinions:{player:{trust:0,respect:0,gratitude:0,resentment:0,affection:0,fear:0},government:{approval:0,legitimacy:0,ideology:"stability"}},emotionalMemories:[],lastReaction:"I am taking the day as it comes."}))}
  function safeSocialV32(a){return typeof ensureSocialV31==="function"?ensureSocialV31(a):(a.socialV31||(a.socialV31={faction:"hearth",factionLoyalty:40,courtship:null,socialHistory:[]}))}
  function voiceProfileV32(a){
    const traits=a.traits||[],seed=hashConversationV32("voice:"+a.id),profession=a.profession||"worker";
    let cadence=traits.includes("direct")||traits.includes("stubborn")||a.cls==="warrior"?"plain":traits.includes("curious")||a.cls==="mage"?"reflective":a.cls==="noble"?"formal":"practical";
    let warmth=traits.includes("generous")||traits.includes("sociable")?.78:traits.includes("independent")?.32:.52;
    let detail=traits.includes("curious")?.78:traits.includes("cautious")?.65:traits.includes("direct")?.34:.50;
    return {cadence,warmth,detail,profession,signature:Math.floor(seed*4)};
  }
  function ensureConversationV32(a){
    if(!a)return null;const voice=voiceProfileV32(a);
    a.conversationV32=Object.assign({version:CONVERSATION_VERSION_V32,voice,recentTurns:[],topicHistory:[],responseCache:[],askedCounts:{},lastIntent:null,lastPlan:null,lastConversationDay:0,summary:"We have not spoken at length yet."},a.conversationV32||{});
    const c=a.conversationV32;c.version=CONVERSATION_VERSION_V32;c.voice=Object.assign(voice,c.voice||{});c.recentTurns=Array.isArray(c.recentTurns)?c.recentTurns.slice(-20):[];c.topicHistory=Array.isArray(c.topicHistory)?c.topicHistory.slice(-12):[];c.responseCache=Array.isArray(c.responseCache)?c.responseCache.slice(-28):[];c.askedCounts=c.askedCounts&&typeof c.askedCounts==="object"?c.askedCounts:{};return c;
  }
  function normalizeQuestionV32(line){return String(line||"").toLowerCase().replace(/[^a-z0-9' ]+/g," ").replace(/\s+/g," ").trim().slice(0,180)}
  function classifyIntentV32(line,a){const q=normalizeQuestionV32(line),c=ensureConversationV32(a);
    if(!q)return "unknown";
    if(/^(hi|hello|hey|greetings|good morning|good evening)\b|how are you/.test(q))return "greeting";
    if(/what did (i|we) say|what have we talked|remember me|our last conversation|earlier conversation/.test(q))return "recall";
    if(/who are you|tell me about yourself|your personality|what kind of person/.test(q))return "identity";
    if(/your goal|long term|ambition|dream|future|what do you want|purpose/.test(q))return "goal";
    if(/how do you feel|your mood|feeling today|are you happy|are you sad/.test(q))return "mood";
    if(/risk|dangerous|afraid|fear|brave|coward|would you fight/.test(q))return "risk";
    if(/what do you think of me|opinion of me|do you trust me|do you like me|hate me|traveler/.test(q))return "playerOpinion";
    if(/government|empire|democracy|council|ruler|vote|policy|politic/.test(q))return "government";
    if(/faction|coalition|league|compact|vanguard|guild/.test(q))return "faction";
    if(/romance|love|courtship|courting|marry|marriage|spouse|betrothed/.test(q))return "romance";
    if(/friend|closest|trust most|grudge|enemy|rival|resent|loyal/.test(q))return "relationships";
    if(/family|husband|wife|child|children|parent|household|home/.test(q))return "family";
    if(/remember|memory|important event|what happened|news|recent event/.test(q))return "memory";
    if(/work|job|trade|profession|skill|working/.test(q))return "work";
    if(/market|price|cost|expensive|cheap|stock|trade/.test(q))return "market";
    if(/shortage|hungry|scarcity|starving|not enough/.test(q))return "shortage";
    if(/road|raid|rat|caravan|war|safe|danger/.test(q))return "danger";
    if(/town|village|egg lands|duskmere|community/.test(q))return "town";
    if(/help|what should i do|what do you need|need from me/.test(q))return "help";
    if(/^why\b|why is that|why do you think/.test(q))return c.lastIntent||"why";
    if(/bye|farewell|goodbye|see you/.test(q))return "farewell";
    return "unknown";
  }
  function opinionNaturalV32(score){return score>=46?"deeply favorable":score>=23?"favorable":score>=7?"cautiously positive":score>-9?"uncertain":score>-28?"wary":"hostile"}
  function riskNaturalV32(value){return value>=.75?"I am willing to gamble heavily when something matters":value>=.58?"I accept measured risks":value>=.40?"I weigh danger carefully before acting":value>=.24?"I usually choose the safer road":"I avoid danger unless someone I love has no other protection"}
  function relationshipFactsV32(a){
    const social=safeSocialV32(a),friend=typeof strongestBondV31==="function"?strongestBondV31(a,"friend"):null,grudge=typeof strongestBondV31==="function"?strongestBondV31(a,"grudge"):null,romance=typeof strongestBondV31==="function"?strongestBondV31(a,"romance"):null;
    return {social,friend,grudge,romance,faction:(typeof FACTIONS_V31!=="undefined"&&FACTIONS_V31[social.faction])||{label:"an informal local group",agenda:"local stability"}};
  }
  function relevantMemoryV32(a,line,intent){const mind=safeMindV32(a),words=new Set(normalizeQuestionV32(line).split(" ").filter(w=>w.length>3)),memories=(mind.emotionalMemories||[]).slice();let best=null,bestScore=-Infinity;for(const m of memories){let score=(Number(m.intensity)||0)*3-Math.max(0,dayNo-(Number(m.day)||dayNo))*.025;if(intent==="shortage"&&(m.tags||[]).includes("shortage"))score+=4;if(intent==="danger"&&((m.tags||[]).includes("raid")||(m.tags||[]).includes("death")||(m.tags||[]).includes("danger")))score+=4;if(intent==="memory")score+=1;const text=String(m.text||"").toLowerCase();for(const word of words)if(text.includes(word))score+=1.2;if(score>bestScore){bestScore=score;best=m}}return best}
  function playerFactsV32(a){return (a.playerMemories||[]).slice(-5).map(m=>m.text||String(m)).filter(Boolean)}
  function conversationSignatureV32(a){const mind=safeMindV32(a),social=safeSocialV32(a),friend=relationshipFactsV32(a).friend;return [dayNo,mind.mood&&mind.mood.label,Math.floor((mind.goal&&mind.goal.progress||0)/10),Math.floor((typeof playerOpinionScoreV30==="function"?playerOpinionScoreV30(a):0)/10),Math.floor((typeof governmentOpinionScoreV30==="function"?governmentOpinionScoreV30(a):0)/10),a.town.market.shortage||"none",governmentFor(a.town).type,a.currentActivity,social.faction,friend&&friend.b&&friend.b.id].join("|")}
  function stablePickV32(a,key,items){return items[Math.floor(hashConversationV32(a.id+":"+key)*items.length)%items.length]}
  function familySummaryV32(a){const byId=id=>agents.find(x=>x.id===id),spouse=byId(a.spouseId),parents=(a.parentIds||[]).map(byId).filter(Boolean),children=(a.childrenIds||[]).map(byId).filter(Boolean);if(a.ageGroup==="child")return "I live with "+(parents.map(x=>x.firstName).join(" and ")||"my household")+" and I am still learning my place in the village.";return (spouse?"My spouse is "+spouse.firstName+". ":"")+(children.length?"Our children are "+children.map(x=>x.firstName).join(" and ")+". ":"")+(a.familyName?"The "+a.familyName+" household shapes most of my choices.":"My household shapes most of my choices.")}
  function marketSummaryV32(a){const m=a.town.market,high=m.prices.map((p,i)=>({p,i})).sort((x,y)=>y.p-x.p)[0],low=m.inventory.map((v,i)=>({v,i})).sort((x,y)=>x.v-y.v)[0];return "The dearest good is "+GOODS[high.i]+" at "+high.p.toFixed(2)+" coins, and "+GOODS[low.i]+" is the thinnest stock at "+Math.floor(low.v)+" units."}
  function identitySummaryV32(a){const mind=safeMindV32(a),voice=ensureConversationV32(a).voice;return "I am "+a.firstName+", a "+String(a.profession||"worker").toLowerCase()+" of "+a.town.name+". I tend to speak "+voice.cadence+"ly, and I am trying to "+mind.goal.label.toLowerCase()+"."}
  function baseDraftV32(a,line,intent){
    const mind=safeMindV32(a),rel=relationshipFactsV32(a),memory=relevantMemoryV32(a,line,intent),playerScore=typeof playerOpinionScoreV30==="function"?playerOpinionScoreV30(a):0,govScore=typeof governmentOpinionScoreV30==="function"?governmentOpinionScoreV30(a):0,c=ensureConversationV32(a),last=c.lastPlan;
    if(intent==="greeting")return stablePickV32(a,"greeting:"+mind.mood.label,["Good to see you. I feel "+mind.mood.label+" today, and I am "+a.currentActivity+".","You found me while I am "+a.currentActivity+". My thoughts are mostly on "+mind.goal.label.toLowerCase()+".","Hello. The day has left me feeling "+mind.mood.label+", but the work still needs doing."]);
    if(intent==="identity")return identitySummaryV32(a);
    if(intent==="goal")return "My long-term goal is to "+mind.goal.label.toLowerCase()+". "+mind.goal.reason+" I have made some progress, but I do not consider it finished.";
    if(intent==="mood")return "I feel "+mind.mood.label+". "+(mind.lastReaction||"The ordinary pressures of work and family are shaping that feeling.")+(memory?" The memory closest to that feeling is: "+memory.text:"");
    if(intent==="risk")return riskNaturalV32(mind.riskTolerance)+". Road safety and what happened to people I know can still change my choice.";
    if(intent==="playerOpinion")return "My view of you is "+opinionNaturalV32(playerScore)+". I remember what you say, but your actions toward my family, friends, and town carry more weight.";
    if(intent==="government")return "My view of the "+governmentFor(a.town).type+" government is "+opinionNaturalV32(govScore)+". I care most about "+mind.opinions.government.ideology+", and recent decisions have made me feel "+mind.mood.label+".";
    if(intent==="faction")return "I stand with the "+rel.faction.label+" because it favors "+rel.faction.agenda+". My loyalty is real, though a bad decision can still weaken it.";
    if(intent==="relationships"){if(rel.grudge&&rel.grudge.r.resentment>=35)return "I trust "+(rel.friend?rel.friend.b.firstName:"few people without reservation")+", but I still carry a grudge against "+rel.grudge.b.firstName+". Shared hardship creates both loyalty and injuries that are hard to forget.";return rel.friend?rel.friend.b.firstName+" is the person I rely on most. We became close through repeated choices, not a single conversation.":"I know my neighbors, but the strongest friendships here are still forming."}
    if(intent==="romance"){if(a.spouseId!=null){const spouse=agents.find(x=>x.id===a.spouseId);return spouse?"I share my life with "+spouse.firstName+". Affection matters, but so do trust, loyalty, and the burdens of our household.":"I am married, and that bond shapes my obligations."}if(rel.social.courtship){const person=agents.find(x=>x.id===rel.social.courtship.targetId);return "I am "+rel.social.courtship.stage+" with "+(person?person.firstName:"someone in town")+". We are learning whether affection can survive ordinary responsibilities."}return rel.romance?"I have feelings for "+rel.romance.b.firstName+", but nothing is settled yet.":"No courtship currently has a claim on my future."}
    if(intent==="family")return familySummaryV32(a);
    if(intent==="memory")return memory?"The memory with the strongest hold on me is this: "+memory.text+" It still affects how I judge risk, trust, and what the town owes its people.":"No single event dominates my thoughts today, though I still carry the accumulated weight of ordinary days.";
    if(intent==="recall"){const facts=playerFactsV32(a),turns=c.recentTurns.filter(t=>t.role==="user").slice(-3).map(t=>t.text);if(facts.length)return "I remember that "+facts.slice(-2).join(" ")+" Our recent conversation also touched on "+(c.topicHistory.slice(-3).map(x=>INTENT_LABELS_V32[x.intent]||x.intent).join(", ")||"village life")+".";if(turns.length)return "You recently asked me about "+c.topicHistory.slice(-3).map(x=>INTENT_LABELS_V32[x.intent]||x.intent).join(", ")+". I have not learned many lasting facts about you yet.";return "We have not spoken enough for me to claim a detailed memory of you."}
    if(intent==="work")return "I work as a "+String(a.profession||"worker").toLowerCase()+" and I am currently "+a.currentActivity+". That work supports my goal to "+mind.goal.label.toLowerCase()+", though shortages and public duties can pull me elsewhere.";
    if(intent==="market")return marketSummaryV32(a)+" My household feels those numbers through what our wages can actually buy.";
    if(intent==="shortage")return a.town.market.shortage?"The "+a.town.market.shortage+" shortage is real. "+(memory?memory.text+" ":"")+"It makes even cautious households reconsider their plans.":"There is no declared shortage today, but the lowest stock is still "+GOODS[a.town.market.inventory.indexOf(Math.min(...a.town.market.inventory))]+".";
    if(intent==="danger")return "Road safety stands near "+Math.round(roadSafety)+" percent. "+riskNaturalV32(mind.riskTolerance)+", but raids, deaths, and lost caravans can make courage look different from one day to the next.";
    if(intent==="town")return a.town.name+" is "+a.town.theme+". Its government is a "+governmentFor(a.town).type+", the "+rel.faction.label+" is part of its political life, and I judge the town by whether ordinary households can build a future here.";
    if(intent==="help")return a.town.market.shortage?"The clearest help would be relieving the "+a.town.market.shortage+" shortage without endangering another household. Safer roads would also make every solution last longer.":roadSafety<45?"The roads need protection. Goods and promises both fail when caravans cannot arrive.":"Ask what the households lack, then strengthen the bottleneck rather than dropping gifts at random.";
    if(intent==="farewell")return stablePickV32(a,"farewell",["Go safely. I will remember how this conversation ended.","Until next time. The village will keep changing while you are gone.","Farewell. I have work to return to, but your words will remain with me."]);
    if(intent==="why"&&last&&last.explanation)return last.explanation;
    if(memory&&memory.intensity>.58)return "I keep circling back to "+memory.text+" It connects to my goal of "+mind.goal.label.toLowerCase()+", and it is part of why I feel "+mind.mood.label+" today.";
    return stablePickV32(a,"unknown:"+normalizeQuestionV32(line)+":"+conversationSignatureV32(a),[
      "I cannot answer that without connecting it to the life I actually know. Right now I am "+a.currentActivity+", and I am trying to "+mind.goal.label.toLowerCase()+".",
      "I am not certain. What I can tell you is that I feel "+mind.mood.label+", I regard you "+opinionNaturalV32(playerScore)+", and recent events still shape my judgment.",
      rel.friend?"I would probably speak with "+rel.friend.b.firstName+" before deciding. Their judgment has earned weight with me.":"I would need more experience before pretending certainty. Trust and evidence matter more to me than a quick answer."
    ]);
  }
  function applyVoiceV32(a,draft,intent){const c=ensureConversationV32(a),v=c.voice,key=intent+":"+draft.slice(0,50),opener=v.cadence==="formal"?["To speak plainly, ","As I see it, ",""][Math.floor(hashConversationV32(a.id+key)*3)]:v.cadence==="reflective"?["I have thought about that. ","I keep returning to this: ",""][Math.floor(hashConversationV32(a.id+key)*3)]:v.cadence==="practical"?["Practically speaking, ","The useful answer is this: ",""][Math.floor(hashConversationV32(a.id+key)*3)]:"";let text=(opener+draft).replace(/\s+/g," ").trim();if(v.detail<.4){const sentences=text.match(/[^.!?]+[.!?]+|[^.!?]+$/g)||[text];text=sentences.slice(0,2).join(" ").trim()}if(v.warmth>.7&&intent==="greeting"&&typeof playerOpinionScoreV30==="function"&&playerOpinionScoreV30(a)>20)text=text.replace(/^/,"Friend, ");return text}
  function makePlanV32(a,line){const c=ensureConversationV32(a),intent=classifyIntentV32(line,a),draft=applyVoiceV32(a,baseDraftV32(a,line,intent),intent),signature=conversationSignatureV32(a),key=intent+"|"+normalizeQuestionV32(line)+"|"+signature;return {intent,draft,key,signature,explanation:"Because my goal, memories, relationships, and present conditions all point me toward that conclusion."}}
  function cachedReplyV32(a,key){const c=ensureConversationV32(a),hit=c.responseCache.find(x=>x.key===key);return hit?hit.reply:null}
  function storeReplyV32(a,plan,reply,source){const c=ensureConversationV32(a);c.responseCache=c.responseCache.filter(x=>x.key!==plan.key);c.responseCache.push({key:plan.key,reply,source,day:dayNo});if(c.responseCache.length>28)c.responseCache.shift();c.lastPlan={intent:plan.intent,explanation:plan.explanation,draft:plan.draft,day:dayNo};c.lastIntent=plan.intent;c.lastConversationDay=dayNo}
  function recordTurnV32(a,role,text,intent=null){const c=ensureConversationV32(a);c.recentTurns.push({day:dayNo,role,text:String(text).slice(0,320),intent});if(c.recentTurns.length>20)c.recentTurns.shift();if(role==="user"&&intent){c.topicHistory.push({day:dayNo,intent});if(c.topicHistory.length>12)c.topicHistory.shift();c.askedCounts[intent]=(c.askedCounts[intent]||0)+1}const topics=c.topicHistory.slice(-4).map(x=>INTENT_LABELS_V32[x.intent]||x.intent);c.summary=topics.length?"We have recently discussed "+topics.join(", ")+".":"We have only exchanged brief words.";a.dialogueHistory=a.dialogueHistory||[];a.dialogueHistory.push({role,content:String(text).slice(0,500)});if(a.dialogueHistory.length>16)a.dialogueHistory.splice(0,a.dialogueHistory.length-16)}
  function validateModelReplyV32(reply,draft){if(!reply||reply.length>650)return false;if(/\b(ai|language model|prompt|json|simulation|game state|hidden score)\b/i.test(reply))return false;if(/[{}\[\]]/.test(reply))return false;const nums=reply.match(/\b\d+(?:\.\d+)?\b/g)||[],allowed=new Set(draft.match(/\b\d+(?:\.\d+)?\b/g)||[]);if(nums.some(n=>!allowed.has(n)))return false;return true}
  async function expressiveRewriteV32(a,line,plan){
    const c=ensureConversationV32(a),state=dialogueState(a),lite=llmConfig.backend==="browser-lite",recent=c.recentTurns.slice(-4).map(t=>({role:t.role,content:t.text}));
    const facts={voice:c.voice,traits:a.traits,goal:state.mind&&state.mind.goal,mood:state.mind&&state.mind.mood,social:state.social,playerFacts:playerFactsV32(a),approvedDraft:plan.draft};
    const system="Rewrite an approved factual villager reply in first person. Preserve every fact, relationship, name, uncertainty, and number in the approved draft. Do not answer beyond the draft and do not add events, people, possessions, promises, or lore. Match the supplied voice and traits. Return only 1-4 plain sentences. Never mention AI, prompts, models, JSON, scores, or a game. /no_think";
    const messages=[{role:"system",content:system},{role:"system",content:"Allowed facts and voice: "+JSON.stringify(facts)},...recent,{role:"user",content:"Traveler asked: "+line+"\nApproved factual reply: "+plan.draft+"\nRewrite only the approved reply."}];
    const response=await llmEngine.chat.completions.create({messages,temperature:lite?.48:.58,max_tokens:lite?100:220});let reply=String(response.choices?.[0]?.message?.content||"").replace(/<think>[\s\S]*?(?:<\/think>|$)/gi,"").replace(/```[\s\S]*?```/g,"").trim().replace(/^(\"|“)|(\"|”)$/g,"").trim();if(!validateModelReplyV32(reply,plan.draft))throw new Error("The local phrasing model changed or added unsupported facts.");return reply
  }
  async function conversationReplyV32(a,line){const plan=makePlanV32(a,line),cached=cachedReplyV32(a,plan.key);recordTurnV32(a,"user",line,plan.intent);if(cached){recordTurnV32(a,"assistant",cached,plan.intent);ensureConversationV32(a).lastIntent=plan.intent;return {reply:cached,source:"cache",plan}}let reply=plan.draft,source="deterministic";if(llmConfig.enabled&&llmEngine){reply=await expressiveRewriteV32(a,line,plan);source="local phrasing model"}storeReplyV32(a,plan,reply,source);recordTurnV32(a,"assistant",reply,plan.intent);return {reply,source,plan}}

  const previousNpcOpeningV32=npcOpening;npcOpening=function(a){ensureConversationV32(a);const mind=safeMindV32(a),c=ensureConversationV32(a),facts=playerFactsV32(a),draft=baseDraftV32(a,"hello","greeting");return '"'+applyVoiceV32(a,draft,"greeting")+(facts.length?" I still remember something you told me before.":"")+'"'};
  npcResponse=function(a,line){const plan=makePlanV32(a,line);storeReplyV32(a,plan,plan.draft,"deterministic");return plan.draft};
  const previousDialogueStateV32=dialogueState;dialogueState=function(a){const state=previousDialogueStateV32(a),c=ensureConversationV32(a);state.conversation={voice:Object.assign({},c.voice),summary:c.summary,lastIntent:c.lastIntent,recentTopics:c.topicHistory.slice(-5),knownTravelerFacts:playerFactsV32(a),cacheEntries:c.responseCache.length};return state};
  llmDialogueResponse=async function(a,line){const plan=makePlanV32(a,line);return expressiveRewriteV32(a,line,plan)};

  function renderDialogueSuggestionsV32(a){const text=document.getElementById("dialogueText");if(!text||!text.parentElement)return;let box=document.getElementById("dialogueSuggestionsV32");if(!box){box=document.createElement("div");box.id="dialogueSuggestionsV32";text.insertAdjacentElement("afterend",box)}box.innerHTML="";const rel=relationshipFactsV32(a),questions=["What are you working toward?","What do you remember about me?","What do you think of the government?",rel.social.courtship?"Tell me about your courtship.":rel.friend?"Who do you trust most?":"How are you feeling today?"];for(const q of questions){const b=document.createElement("button");b.type="button";b.textContent=q;b.addEventListener("click",()=>{const input=document.getElementById("dialogueInput");if(input){input.value=q;input.focus()}});box.appendChild(b)}}
  const previousOpenDialogueV32=openDialogue;openDialogue=function(a){const result=previousOpenDialogueV32(a),c=ensureConversationV32(a),meta=document.getElementById("npcMeta");if(meta)meta.textContent+=" · voice "+c.voice.cadence+" · remembers "+playerFactsV32(a).length+" traveler facts";renderDialogueSuggestionsV32(a);return result};

  sendDialogue=async function(){
    if(!dialogueAgent||dialogueBusy)return;const input=document.getElementById("dialogueInput"),line=input.value.trim();if(!line)return;const a=dialogueAgent,output=document.getElementById("dialogueText"),button=document.getElementById("dialogueSend");input.value="";
    rememberImportantPlayerFact(a,line);deepenPlayerRelationship(a,true);if(typeof propagatePlayerTreatmentV31==="function")propagatePlayerTreatmentV31(a,line);
    dialogueBusy=true;input.disabled=true;button.disabled=true;output.textContent=a.firstName+" considers how this fits with what they already know...";
    try{const result=await conversationReplyV32(a,line);if(dialogueAgent===a){output.textContent=result.reply;playSfx("talk")}}
    catch(error){const plan=makePlanV32(a,line);storeReplyV32(a,plan,plan.draft,"deterministic fallback");recordTurnV32(a,"assistant",plan.draft,plan.intent);if(dialogueAgent===a){output.textContent=plan.draft;playSfx("talk")}}
