<script id="physical-resources-v21-script">
(function(){
  "use strict";
  const PHYSICAL_RESOURCE_VERSION=1;
  const DITCH_TILE_V21=16;
  let physicalFishBodiesV21=[];
  let fishBodyByTileV21=new Map();
  let ditchCellsV21=new Map();
  let resourceEffectsV21=[];
  let physicalFrameTimeV21=performance.now();

  function ensurePhysicalPlayerV21(){
    player.equipment=Object.assign({fishing:false,forestry:false,mining:false,hunting:false,digging:false},player.equipment||{});
    player.lifeSkills=Object.assign({fishing:0,forestry:0,mining:0,hunting:0,digging:0},player.lifeSkills||{});
  }
  function installShovelDataV21(){
    if(!EQUIPMENT.digging)EQUIPMENT.digging={name:"Field Shovel",icon:"Y",price:6};
    if(!LIFE_SKILLS.digging)LIFE_SKILLS.digging={name:"Earthworks",icon:"▱",material:2,nodes:[
      ["Strong Back","Dig and refill ditches with less recovery time."],
      ["Water Reader","Wet ditches are easier to identify and extend."],
      ["Canal Keeper","Connected ditches retain water through dry ground."]
    ]};
    if(!PACK_DEFS.tool_digging)PACK_DEFS.tool_digging={name:"Field Shovel",icon:"Y",w:1,h:3,stack:1};
  }
  function waterKeyV21(x,y){return x+","+y}
  function bodyLabelV21(body){return body.isPond?"Fishing Pond":body.cells.length>70?"Great Water":body.cells.length>24?"Lake":"Pool"}
  function buildFishBodiesV21(savedBodies){
    physicalFishBodiesV21=[];fishBodyByTileV21=new Map();
    const visited=new Set(),savedMap=new Map((savedBodies||[]).map(b=>[b.id,b]));
    const pondX=resourceNodes&&resourceNodes.fishing?Math.floor(resourceNodes.fishing.x/TILE):25;
    const pondY=resourceNodes&&resourceNodes.fishing?Math.floor(resourceNodes.fishing.y/TILE):5;
    for(let sy=0;sy<MH;sy++)for(let sx=0;sx<MW;sx++){
      const start=waterKeyV21(sx,sy);if(visited.has(start)||tiles[sy]?.[sx]!==2)continue;
      const queue=[[sx,sy]],cells=[];visited.add(start);
      while(queue.length){
        const [x,y]=queue.shift();cells.push({x,y});
        for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
          const nx=x+dx,ny=y+dy,key=waterKeyV21(nx,ny);
          if(nx<0||ny<0||nx>=MW||ny>=MH||visited.has(key)||tiles[ny]?.[nx]!==2)continue;
          visited.add(key);queue.push([nx,ny]);
        }
      }
      const ordered=cells.slice().sort((a,b)=>a.y-b.y||a.x-b.x),id=waterKeyV21(ordered[0].x,ordered[0].y);
      const isPond=cells.some(c=>c.x===pondX&&c.y===pondY);
      const calculatedMax=isPond?60:Math.max(12,Math.min(180,Math.round(cells.length*1.8)));
      const saved=savedMap.get(id),savedMax=Number(saved&&saved.max),savedStock=Number(saved&&saved.stock),max=Math.max(1,Number.isFinite(savedMax)?savedMax:calculatedMax);
      const initialStock=Number.isFinite(savedStock)?savedStock:(isPond&&resourceNodes.fishing?resourceNodes.fishing.stock:max);
      const body={id,cells,max,stock:Math.max(0,Math.min(max,initialStock)),isPond};
      body.cx=cells.reduce((n,c)=>n+c.x,0)/cells.length;body.cy=cells.reduce((n,c)=>n+c.y,0)/cells.length;
      body.markers=ordered.filter((c,i)=>i%Math.max(1,Math.floor(ordered.length/9))===0).slice(0,9);
      physicalFishBodiesV21.push(body);for(const c of cells)fishBodyByTileV21.set(waterKeyV21(c.x,c.y),body);
    }
    syncFishingNodeV21();
  }
  function syncFishingNodeV21(){
    const pond=physicalFishBodiesV21.find(b=>b.isPond);if(pond&&resourceNodes&&resourceNodes.fishing){resourceNodes.fishing.max=pond.max;resourceNodes.fishing.stock=pond.stock}
  }
  function fishBodyAtV21(x,y){return fishBodyByTileV21.get(waterKeyV21(x,y))||null}
  function nearbyFishBodyV21(radiusTiles=3){
    if(scene!=="world")return null;

    for(let y=py-radiusTiles;y<=py+radiusTiles;y++)for(let x=px-radiusTiles;x<=px+radiusTiles;x++){

  function fishStatusV21(body){

  }
  function drawDitchesOnWorldV21(){

    }
  }

  }
  function canDigTileV21(x,y){

  function digDitchV21(){

    const target=facingTileV21(),existing=ditchCellsV21.get(target.key);

      player.harvestAnim=.28;player.harvestKind="mining";playSfx("mine");toast("You refill the ditch and level the ground.");saveGame(true);return true;
    }

    ditchCellsV21.set(target.key,{originalTile:tiles[target.y][target.x],wet:false,dugDay:dayNo});tiles[target.y][target.x]=DITCH_TILE_V21;solid.delete(target.key);
    refreshDitchWaterV21();paintWorld();player.harvestAnim=.32;player.harvestKind="mining";playSfx("mine");
    const cx=target.x*TILE+8,cy=target.y*TILE+8;for(let i=0;i<7;i++)particles.push({scene:"world",x:cx,y:cy,vx:(rand()-.5)*36,vy:(rand()-.5)*36,life:.32,color:"#8b6a41"});
    const state=ditchCellsV21.get(target.key);gainPlayerXP(1,"earthworks");toast(state.wet?"Ditch dug. Water flows into the new channel.":"Ditch dug. Connect it to water to create an irrigation channel.");updateUI();saveGame(true);return true;
