<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f1218">
<title>The Egg Lands - Character Foundations v20</title>
<style>
  html,body{height:100%;margin:0;background:#0f1218;color:#eadfc7;font-family:"Courier New",monospace}
  body{display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;box-sizing:border-box}
  #loader{max-width:720px;border:1px solid #354052;background:#1a202a;padding:24px;line-height:1.55}
  #loader strong{display:block;color:#e2ad45;letter-spacing:2px;margin-bottom:10px}
  #loader small{color:#a69c87}
</style>
</head>
<body>
<div id="loader"><strong>THE EGG LANDS - CHARACTER FOUNDATIONS v20</strong><small>Loading the pinned Economics-RPG build and applying the character-creation update...</small></div>
<script>
(async function(){
  const BASE_URL="https://raw.githubusercontent.com/RayCarpenterIII/Economics-RPG/305c70fdda6531d6913f31b0ec17ce61b68c4cf3/index.html";
  const patch=String.raw`
<style id="character-foundations-v20-style">
  #classPanel{justify-content:flex-start;padding:18px 16px 40px;gap:10px}
  #classPanel>h2{margin-top:2px}
  #identityForm{width:min(850px,100%);display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:9px;text-align:left;background:rgba(26,32,42,.96);border:1px solid var(--line);padding:12px}
  .identityField{display:flex;flex-direction:column;gap:5px;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
  .identityField input,.identityField select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);padding:9px;font:11px "Courier New",monospace;text-transform:none;letter-spacing:0}
  .identityField input:focus,.identityField select:focus{border-color:var(--gold);outline:none}
  #identitySummary{grid-column:1/-1;border-top:1px solid var(--line);padding-top:9px;display:grid;grid-template-columns:minmax(170px,.7fr) minmax(260px,1.3fr);gap:10px;align-items:start}
  #identitySummary strong{color:var(--gold);font-size:11px;letter-spacing:1px}
  #identitySummary small{display:block;color:var(--dim);line-height:1.45;margin-top:4px}
  #identityModifiers{font-size:9px;line-height:1.55;color:var(--ink)}
  #identityError{grid-column:1/-1;color:var(--bad);font-size:10px;min-height:15px;text-align:center}
  #classCards{width:min(850px,100%)}
  #classCards .card{position:relative}
  #classCards.identityLocked .card{opacity:.58}
  #classCards.identityLocked .card:after{content:"Complete identity first";position:absolute;inset:auto 6px 6px;background:rgba(15,18,24,.92);border:1px solid var(--line);padding:3px;text-align:center;font-size:8px;color:var(--dim)}
  .identityBadge{display:inline-block;border:1px solid var(--line);padding:2px 5px;margin:2px 3px 2px 0;color:var(--gold);font-size:9px}
  @media(max-width:680px){#identityForm{grid-template-columns:1fr}#identitySummary{grid-template-columns:1fr}.card{width:min(100%,320px)}}
</style>
<script id="character-foundations-v20-script">
(function(){
  "use strict";
  const PROFILE_VERSION=1;
  const ANCESTRIES={
    human:{label:"Human",icon:"●",description:"Adaptable settlers with balanced abilities and broad cultural flexibility.",hp:0,speed:1,attack:0,special:0,defense:0,stamina:5},
    elf:{label:"Elf",icon:"◇",description:"Long-lived woodland folk with quick movement and a strong affinity for magic.",hp:-1,speed:1.06,attack:0,special:1,defense:0,stamina:0},
    dwarf:{label:"Dwarf",icon:"◆",description:"Mountain-born builders who endure hard labor and resist physical danger.",hp:2,speed:.94,attack:0,special:0,defense:1,stamina:5},
    halfling:{label:"Halfling",icon:"○",description:"Small, energetic travelers with exceptional stamina and nimble movement.",hp:-1,speed:1.08,attack:0,special:0,defense:0,stamina:10},
    goblin:{label:"Goblin",icon:"▲",description:"Ingenious scavengers who move quickly and turn improvised tools into weapons.",hp:0,speed:1.05,attack:1,special:0,defense:0,stamina:5},
    fey:{label:"Fey-Touched",icon:"✦",description:"Mortals altered by the Fey Wild, carrying subtle magic and unusual grace.",hp:0,speed:1.03,attack:0,special:1,defense:0,stamina:5},
    dragon:{label:"Dragon-Blooded",icon:"⬢",description:"Rare descendants of ancient wyrms, physically powerful and naturally resilient.",hp:2,speed:.96,attack:1,special:0,defense:1,stamina:0},
    grung:{label:"Grung",icon:"♣",description:"Amphibious forest folk who are agile, colorful, and unusually attuned to natural magic.",hp:-1,speed:1.07,attack:0,special:1,defense:0,stamina:5},
    cat:{label:"Catfolk",icon:"♠",description:"Upright magical cats with humanlike hands, fast reflexes, and instinctive spellcraft.",hp:-1,speed:1.09,attack:0,special:1,defense:0,stamina:0}
  };
  const DEFAULT_PROFILE={name:"The Wanderer",age:25,ancestry:"human",gender:"Unspecified",customGender:"",identityVersion:PROFILE_VERSION};

  function ageProfile(age){
    age=Math.max(16,Math.min(100,Number(age)||25));
    if(age<=24)return {label:"Young adult",speed:1.04,hp:0,attack:0,special:0,defense:0,stamina:8,description:"Quick to recover and eager to learn."};
    if(age<=49)return {label:"Adult",speed:1,hp:0,attack:0,special:0,defense:0,stamina:0,description:"Balanced physical conditioning and experience."};
    if(age<=64)return {label:"Mature adult",speed:.97,hp:0,attack:0,special:1,defense:0,stamina:-5,description:"Greater practiced judgment with slightly reduced endurance."};
    return {label:"Elder",speed:.90,hp:-1,attack:0,special:1,defense:1,stamina:-12,description:"Deep experience and resolve, offset by slower movement."};
  }
  function safe(value){return String(value??"").replace(/[&<>\"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]))}
  function ensureProfile(){
    if(!player||typeof player!=="object")return;
    for(const key of Object.keys(DEFAULT_PROFILE))if(player[key]===undefined||player[key]===null)player[key]=DEFAULT_PROFILE[key];
    if(!ANCESTRIES[player.ancestry])player.ancestry="human";
    player.age=Math.max(16,Math.min(100,Number(player.age)||25));
  }
  function genderLabel(){return player.gender==="Custom"?(player.customGender||"Custom"):player.gender}
  function combinedBonuses(){
    ensureProfile();
    const ancestry=ANCESTRIES[player.ancestry]||ANCESTRIES.human,age=ageProfile(player.age);
    return {ancestry,age,hp:ancestry.hp+age.hp,speed:ancestry.speed*age.speed,attack:ancestry.attack+age.attack,special:ancestry.special+age.special,defense:ancestry.defense+age.defense,stamina:ancestry.stamina+age.stamina};
  }

  const originalMods=mods;
  mods=function(){
    const base=originalMods(),bonus=combinedBonuses();
    return Object.assign({},base,{
      maxHp:Math.max(6,base.maxHp+bonus.hp),
      speed:base.speed*bonus.speed,
      attackPower:base.attackPower+bonus.attack,
      specialBonus:base.specialBonus+bonus.special,
      defense:base.defense+bonus.defense,
      maxStamina:Math.max(60,base.maxStamina+bonus.stamina)
    });
  };

  const originalSnapshot=snapshot;
  snapshot=function(){
    ensureProfile();
    const data=originalSnapshot();
    data.version=Math.max(20,Number(data.version)||0);
    Object.assign(data.player,{name:player.name,age:player.age,ancestry:player.ancestry,gender:player.gender,customGender:player.customGender,identityVersion:PROFILE_VERSION});
    return data;
  };

  const originalSetupGame=setupGame;
  setupGame=function(newSeed,loading=false){
    const result=originalSetupGame(newSeed,loading);
    if(!loading)Object.assign(player,DEFAULT_PROFILE);
    ensureProfile();
    window.setTimeout(syncFormFromPlayer,0);
    return result;
  };

  const originalRenderPlayerStats=renderPlayerStats;
  renderPlayerStats=function(){
    originalRenderPlayerStats();
    if(!selectedClass)return;
    ensureProfile();
    const wrap=document.getElementById("statsContent"),hero=wrap&&wrap.querySelector(".statsHero"),grid=hero&&hero.querySelector(".statsGrid"),portrait=hero&&hero.querySelector(".statsPortrait"),heading=hero&&hero.querySelector("h3");
    const ancestry=ANCESTRIES[player.ancestry]||ANCESTRIES.human,age=ageProfile(player.age);
    if(portrait)portrait.textContent=ancestry.icon;
    if(heading)heading.textContent=(player.name||"The Wanderer").toUpperCase()+" - "+selectedClass.toUpperCase()+" - LEVEL "+player.level;
    if(grid)grid.insertAdjacentHTML("afterbegin",statLine("Ancestry",safe(ancestry.label))+statLine("Age",player.age+" - "+safe(age.label))+statLine("Gender",safe(genderLabel())));
  };

  function formValues(){
    const name=(document.getElementById("identityName")?.value||"").trim();
    const age=Number(document.getElementById("identityAge")?.value||25);
    const ancestry=document.getElementById("identityAncestry")?.value||"human";
    const gender=document.getElementById("identityGender")?.value||"Unspecified";
    const customGender=(document.getElementById("identityCustomGender")?.value||"").trim();
    return {name,age,ancestry,gender,customGender};
  }
  function validateProfile(showError=true){
    const values=formValues(),errors=[];
    if(values.name.length<2)errors.push("Enter a character name.");
    if(!Number.isFinite(values.age)||values.age<16||values.age>100)errors.push("Age must be between 16 and 100.");
    if(!ANCESTRIES[values.ancestry])errors.push("Choose an ancestry.");
    if(values.gender==="Custom"&&!values.customGender)errors.push("Describe the custom gender identity.");
    const error=document.getElementById("identityError");if(error&&showError)error.textContent=errors.join(" ");
    document.getElementById("classCards")?.classList.toggle("identityLocked",errors.length>0);
    return errors.length===0;
  }
  function applyProfile(){
    const values=formValues();
    Object.assign(player,values,{age:Math.round(values.age),identityVersion:PROFILE_VERSION});
    const m=mods();player.maxHp=m.maxHp;player.hp=Math.min(player.maxHp,Math.max(1,player.hp||player.maxHp));player.stamina=Math.min(m.maxStamina,Math.max(0,player.stamina||m.maxStamina));
  }
  function modifierText(value,suffix=""){return value===0?"none":(value>0?"+":"")+value+suffix}
  function updateIdentitySummary(){
    const values=formValues(),ancestry=ANCESTRIES[values.ancestry]||ANCESTRIES.human,age=ageProfile(values.age),custom=document.getElementById("identityCustomField");
    if(custom)custom.style.display=values.gender==="Custom"?"flex":"none";
    const summary=document.getElementById("identitySummaryText"),modsEl=document.getElementById("identityModifiers");
    if(summary)summary.innerHTML='<strong>'+ancestry.icon+' '+safe(ancestry.label)+' - '+safe(age.label)+'</strong><small>'+safe(ancestry.description)+' '+safe(age.description)+'</small>';
    if(modsEl)modsEl.innerHTML='<span class="identityBadge">HP '+modifierText(ancestry.hp+age.hp)+'</span><span class="identityBadge">Speed '+Math.round((ancestry.speed*age.speed-1)*100)+(ancestry.speed*age.speed>=1?"% faster":"%")+'</span><span class="identityBadge">Attack '+modifierText(ancestry.attack+age.attack)+'</span><span class="identityBadge">Magic '+modifierText(ancestry.special+age.special)+'</span><span class="identityBadge">Defense '+modifierText(ancestry.defense+age.defense)+'</span><span class="identityBadge">Stamina '+modifierText(ancestry.stamina+age.stamina)+'</span>';
    validateProfile(false);
  }
  function syncFormFromPlayer(){
    ensureProfile();
    const pairs={identityName:player.name,identityAge:player.age,identityAncestry:player.ancestry,identityGender:player.gender,identityCustomGender:player.customGender};
    for(const [id,value] of Object.entries(pairs)){const element=document.getElementById(id);if(element)element.value=value}
    updateIdentitySummary();
  }
  function installIdentityForm(){
    const panel=document.getElementById("classPanel"),cards=document.getElementById("classCards");if(!panel||!cards||document.getElementById("identityForm"))return;
    panel.querySelector("h2").textContent="Create Your Character";
    const intro=panel.querySelector(".sub");if(intro)intro.textContent="Choose your identity first, then commit to a permanent combat Specialty. Gathering Skills remain open to every character with the right equipment.";
    const form=document.createElement("div");form.id="identityForm";
    form.innerHTML='<label class="identityField">Name<input id="identityName" maxlength="28" value="The Wanderer" autocomplete="off"></label><label class="identityField">Age<input id="identityAge" type="number" min="16" max="100" step="1" value="25"></label><label class="identityField">Ancestry<select id="identityAncestry">'+Object.entries(ANCESTRIES).map(([key,value])=>'<option value="'+key+'">'+value.icon+' '+value.label+'</option>').join("")+'</select></label><label class="identityField">Gender<select id="identityGender"><option>Woman</option><option>Man</option><option>Nonbinary</option><option selected>Unspecified</option><option>Custom</option></select></label><label class="identityField" id="identityCustomField" style="display:none;grid-column:1/-1">Custom gender<input id="identityCustomGender" maxlength="32" placeholder="Enter your character identity"></label><div id="identitySummary"><div id="identitySummaryText"></div><div id="identityModifiers"></div></div><div id="identityError"></div>';
    cards.parentNode.insertBefore(form,cards);
    for(const id of ["identityName","identityAge","identityAncestry","identityGender","identityCustomGender"]){document.getElementById(id).addEventListener("input",updateIdentitySummary);document.getElementById(id).addEventListener("change",updateIdentitySummary)}
    const guard=function(event){
      if(!event.target.closest(".card"))return;
      if(!validateProfile(true)){event.preventDefault();event.stopImmediatePropagation();return}
      applyProfile();
    };
    cards.addEventListener("click",guard,true);cards.addEventListener("keydown",event=>{if(event.key==="Enter")guard(event)},true);
    syncFormFromPlayer();
  }

  ensureProfile();
  installIdentityForm();
  const title=document.querySelector("header h1");if(title)title.title="Character Foundations v20";
})();
<\/script>`.replace("<\\/script>","<"+"/script>");

  try{
    const response=await fetch(BASE_URL,{cache:"no-store"});
    if(!response.ok)throw new Error("GitHub returned "+response.status+" "+response.statusText);
    let html=await response.text();
    html=html.replace(/<title>The Egg Lands<\/title>/,'<title>The Egg Lands - Character Foundations v20<\/title>');
    if(!html.includes("</body>"))throw new Error("The pinned game build is malformed.");
    html=html.replace("</body>",patch+"\n</body>");
    document.open();document.write(html);document.close();
  }catch(error){
    document.getElementById("loader").innerHTML='<strong>THE EGG LANDS - v20</strong><small>This intermediate build could not retrieve its pinned base game. Connect to the internet and reopen the HTML.<br><br>'+String(error&&error.message||error)+'</small>';
  }
})();
</script>
</body>
</html>
